name: Generate flatmap with mapmaker

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'ZIP file URL containing the flatmap data'
        required: true
        type: string
        default: 'https://github.com/hsorby/run-flatmap-maker/releases/download/input/rcl_circuit.zip'

jobs:
  generate-flatmap:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Flatmap Maker
        run: |
          python -m pip install ${{ vars.REMOTE_MAKER_WHEEL }}

      - name: Download zip
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o file.zip
          unzip file.zip

      - name: Run mapmaker
        run: |
          mapmaker \
            --output ./flatmaps \
            --source manifest.json \
            --force \
            --log mapmaker.log \
            --no-path-layout \
            --ignore-git \
            --background-tiles
        env:
          SCICRUNCH_API_KEY: ${{ secrets.SCICRUNCH_API_KEY }}

      - name: Upload flatmaps
        uses: actions/upload-artifact@v7
        with:
          name: flatmaps
          path: flatmaps

      - name: Upload log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mapmaker-log
          path: mapmaker.log
